# Minimal CI — checkout and README presence (extend per stack as needed)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: README present
        run: |
          test -f README.md || test -f readme.md || test -f Readme.MD

      - name: Done
        run: echo "CI health OK"
